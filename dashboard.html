    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { checkAuthState, logoutUser, getCurrentUserData } from './js/auth.js';
        
        // Session tracking
        let sessionStartTime = Date.now();
        let sessionTimer;
        
        function updateTimeSpent() {
            const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
            const hours = Math.floor(elapsed / 3600);
            const minutes = Math.floor((elapsed % 3600) / 60);
            const seconds = elapsed % 60;
            
            const timeStr = hours > 0 
                ? `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`
                : `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            document.getElementById('timeSpent').textContent = timeStr;
        }
        
        // Check authentication and load user data
        checkAuthState(async (state) => {
            if (!state.loggedIn) {
                window.location.href = 'login.html';
                return;
            }
            
            // Update welcome message
            if (state.userData && state.userData.fullName) {
                document.getElementById('welcomeMessage').textContent = `مرحبا يا ${state.userData.fullName}`;
                document.getElementById('completedExercises').textContent = state.userData.completedExercises || 0;
            } else {
                document.getElementById('welcomeMessage').textContent = 'مرحبا ياطالب';
            }
            
            // Start session timer
            sessionTimer = setInterval(updateTimeSpent, 1000);
            updateTimeSpent();
        });
        
        // Logout handlers
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
            window.location.href = 'login.html';
        });
        
        document.getElementById('logoutBtn2').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
            window.location.href = 'login.html';
        });
    </script>
