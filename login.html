<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة الطلاب</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <h1>تسجيل الدخول</h1>
                <p>أدخل بياناتك للوصول إلى حسابك</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="studentId">رقم الطالب</label>
                    <input type="text" id="studentId" name="studentId" placeholder="أدخل رقم الطالب" required>
                    <p class="error-message" id="studentIdError"></p>
                </div>
                
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>
                    <p class="error-message" id="passwordError"></p>
                </div>
                
                <p class="error-message" id="generalError"></p>
                
                <button type="submit" class="btn btn-primary">
                    <span>تسجيل الدخول</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14"></path>
                        <path d="M12 5l7 7-7 7"></path>
                    </svg>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
            </div>
        </div>
    </div>
    
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { loginUser } from './js/auth.js';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const studentId = document.getElementById('studentId').value.trim();
            const password = document.getElementById('password').value;
            
            // Clear previous errors
            document.getElementById('studentIdError').classList.remove('show');
            document.getElementById('passwordError').classList.remove('show');
            document.getElementById('generalError').classList.remove('show');
            
            // Validate student ID
            if (!studentId) {
                document.getElementById('studentIdError').textContent = 'يرجى إدخال رقم الطالب';
                document.getElementById('studentIdError').classList.add('show');
                return;
            }
            
            if (!studentId.startsWith('102568')) {
                document.getElementById('studentIdError').textContent = 'رقم الطالب يجب أن يبدأ بـ 102568';
                document.getElementById('studentIdError').classList.add('show');
                return;
            }
            
            if (!password) {
                document.getElementById('passwordError').textContent = 'يرجى إدخال كلمة المرور';
                document.getElementById('passwordError').classList.add('show');
                return;
            }
            
            // Attempt login
            const result = await loginUser(studentId, password);
            
            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('generalError').textContent = result.error || 'حدث خطأ أثناء تسجيل الدخول';
                document.getElementById('generalError').classList.add('show');
            }
        });
    </script>
</body>
</html>
