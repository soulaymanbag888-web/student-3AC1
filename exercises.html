<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التمارين - منصة الطلاب</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/exercises.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                </svg>
                <span>منصة الطلاب</span>
            </div>
            <nav>
                <a href="dashboard.html">الرئيسية</a>
                <a href="equations.html">المعادلات</a>
                <a href="systems.html">النظامات</a>
                <a href="exercises.html" class="active">التمارين</a>
                <a href="about.html">عن الموقع</a>
                <a href="contact.html">اتصل بنا</a>
                <a href="#" id="logoutBtn">تسجيل الخروج</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-title">
            <h1>التمارين</h1>
        </div>
        
        <div id="exercisesContainer" class="exercises-grid">
            <!-- Exercises will be loaded from Firebase -->
        </div>
        
        <div id="noExercisesMessage" class="no-exercises">
            <svg class="no-exercises-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            <h3>لا توجد تمارين حالياً</h3>
            <p>سيتم إضافة التمارين قريباً</p>
        </div>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة - منصة الطلاب</p>
    </footer>

    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/exercises.js"></script>
    <script type="module">
        import { initExercisesPage } from './js/exercises.js';
        
        // Initialize the exercises page
        initExercisesPage();
        
        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const { logoutUser } = await import('./js/auth.js');
            await logoutUser();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
