<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - منصة الطلاب</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/content.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                </svg>
                <span>منصة الطلاب</span>
            </div>
            <nav>
                <a href="dashboard.html">الرئيسية</a>
                <a href="equations.html">المعادلات</a>
                <a href="systems.html">النظامات</a>
                <a href="exercises.html">التمارين</a>
                <a href="about.html">عن الموقع</a>
                <a href="contact.html" class="active">اتصل بنا</a>
                <a href="#" id="logoutBtn">تسجيل الخروج</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="contact-container">
            <div class="contact-card">
                <h2>اتصل بنا</h2>
                
                <form class="contact-form" action="https://formspree.io/f/xojnbwoq" method="POST">
                    <div class="form-group">
                        <label for="name">الاسم</label>
                        <input type="text" id="name" name="name" placeholder="أدخل اسمك" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">البريد الإلكتروني</label>
                        <input type="email" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">الرسالة</label>
                        <textarea id="message" name="message" placeholder="أدخل رسالتك" required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">
                        <span>إرسال الرسالة</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
                
                <div class="contact-info">
                    <p>نحن هنا لمساعدتك في أي وقت</p>
                    <p>سيتم الرد على استفساراتك في أقرب وقت ممكن</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة - منصة الطلاب</p>
    </footer>

    <script type="module">
        import { checkAuthState, logoutUser } from './js/auth.js';
        
        checkAuthState((state) => {
            if (!state.loggedIn) {
                window.location.href = 'login.html';
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutUser();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
